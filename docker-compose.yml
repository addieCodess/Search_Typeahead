version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - sqlite_data:/app/db
    environment:
      - DATABASE_URL=sqlite:////app/db/typeahead.db
    command: >
      sh -c "python -m app.core.load_dataset /data/queries.csv &&
             python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend

volumes:
  sqlite_data:
